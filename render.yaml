services:
  - type: web
    name: organ-donation-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn --bind 0.0.0.0:10000 organ_donation.wsgi:application --workers 2 --worker-class sync --timeout 60 --access-logfile - --error-logfile -
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.11.12
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: "10000"
