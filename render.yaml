services:
  - type: web
    name: organ-donation-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn --bind 0.0.0.0:$PORT organ_donation.wsgi --log-file -
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.11.12
      - key: SECRET_KEY
        generateValue: true
